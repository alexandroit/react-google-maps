<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Classic Google Maps Browser Preview</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        font-family: "Avenir Next", "Segoe UI", sans-serif;
        background: #edf4fa;
      }

      #map {
        width: 100%;
        height: 100%;
        min-height: 420px;
      }

      .hint {
        position: absolute;
        z-index: 1;
        left: 12px;
        right: 12px;
        bottom: 12px;
        padding: 10px 12px;
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.94);
        border: 1px solid rgba(16, 32, 51, 0.1);
        box-shadow: 0 12px 24px rgba(16, 32, 51, 0.08);
        color: #34495f;
        font-size: 12px;
        line-height: 1.45;
      }

      .hint strong {
        display: block;
        margin-bottom: 4px;
        color: #102033;
      }
    </style>
  </head>
  <body>
    <div id="map"></div>
    <div class="hint">
      <strong>Classic no-key browser preview</strong>
      This mirrors the raw script-tag behavior: the basemap can appear, but Google may still show an
      authentication warning because no browser API key was provided.
    </div>

    <script>
      function initMap() {
        const location = { lat: 40.7128, lng: -74.006 };

        const map = new google.maps.Map(document.getElementById('map'), {
          zoom: 11,
          center: location
        });

        new google.maps.Marker({
          position: location,
          map,
          title: 'New York City'
        });
      }
    </script>

    <script async src="https://maps.googleapis.com/maps/api/js?key=&callback=initMap"></script>
  </body>
</html>
